<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hlamik Scanner PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn-bg: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 15px; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        h2 { margin-top: 10px; margin-bottom: 5px;}
        p { color: #888; font-size: 14px; margin-bottom: 20px;}
        
        .btn { background-color: var(--btn-bg); color: var(--btn-text); border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: block; box-sizing: border-box; }
        .btn-outline { background-color: transparent; border: 2px solid var(--btn-bg); color: var(--text); }
        .btn:disabled { background-color: #ccc; border-color: #ccc; color: #fff; cursor: not-allowed; }

        /* --- Монтажный стол (Главный экран) --- */
        #main-screen { transition: opacity 0.3s ease; }
        #thumbnails-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .thumb-wrapper { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; line-height: 20px; cursor: pointer; padding: 0; }

        input[type="file"] { display: none; }

        /* --- Полноэкранная Камера --- */
        #camera-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; }
        #video { width: 100%; height: 80%; object-fit: cover; }
        .frame-overlay { position: absolute; top: 10%; left: 10%; width: 80%; height: 60%; border: 2px dashed rgba(255,255,255,0.7); border-radius: 16px; box-sizing: border-box; pointer-events: none; }
        
        /* 🚨 НОВЫЙ ЭЛЕМЕНТ: Счетчик фоток наверху 🚨 */
        #camCounter { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 6px 16px; border-radius: 20px; font-size: 16px; font-weight: bold; z-index: 105; backdrop-filter: blur(5px); transition: transform 0.2s;}

        .camera-controls { height: 20%; display: flex; justify-content: space-around; align-items: center; background: #111; padding: 0 20px; position: relative;}
        .capture-btn { width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid #888; cursor: pointer; transition: transform 0.1s; }
        .capture-btn:active { transform: scale(0.9); background: #eee; }
        .close-cam-btn { color: white; font-size: 16px; background: none; border: none; padding: 10px; font-weight: bold; }
        
        /* Место-заглушка, чтобы кнопка камеры была по центру */
        .ghost-block { width: 60px; height: 50px; } 

        /* 🚨 АНИМАЦИЯ: Летающий кадр 🚨 */
        .fly-animation {
            position: absolute; z-index: 1000; border-radius: 16px; border: 3px solid white; object-fit: cover;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
    </style>
</head>
<body>
    <div id="main-screen">
        <h2>Сканер гаджетов 📷</h2>
        <p>Добавь фото со всех ракурсов (максимум 5 шт.)</p>

        <div id="thumbnails-container"></div>

        <button id="openCameraBtn" class="btn">📸 Сделать фото</button>
        <button id="openGalleryBtn" class="btn btn-outline">🖼 Выбрать из галереи</button>
        <input type="file" id="fileInput" accept="image/*" multiple>

        <button id="uploadBtn" class="btn" style="margin-top: 30px; background-color: #31b545;" disabled>🚀 Отправить на оценку (0/5)</button>
    </div>

    <div id="camera-container">
        <div id="camCounter">Снято: 0 / 5</div>
        <video id="video" autoplay playsinline></video>
        <div class="frame-overlay"></div>
        <div class="camera-controls">
            <button class="close-cam-btn" id="closeCameraBtn">Готово</button>
            <button class="capture-btn" id="captureBtn"></button>
            <div class="ghost-block"></div>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let photos = [];
        const MAX_PHOTOS = 5;

        const mainScreen = document.getElementById('main-screen');
        const cameraContainer = document.getElementById('camera-container');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const thumbnailsContainer = document.getElementById('thumbnails-container');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const camCounter = document.getElementById('camCounter');

        let stream = null;

        // --- ЛОГИКА КАМЕРЫ ---
        document.getElementById('openCameraBtn').addEventListener('click', async () => {
            if (photos.length >= MAX_PHOTOS) return alert("Максимум 5 фото!");
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                updateCamCounter();
                mainScreen.style.display = 'none';
                cameraContainer.style.display = 'flex';
            } catch (err) {
                alert("Нет доступа к камере. Попробуйте выбрать фото из галереи.");
            }
        });

        document.getElementById('closeCameraBtn').addEventListener('click', closeCamera);

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            cameraContainer.style.display = 'none';
            mainScreen.style.display = 'block';
            updateUI();
        }

        document.getElementById('captureBtn').addEventListener('click', () => {
            if (photos.length >= MAX_PHOTOS) {
                alert("Достигнут лимит в 5 фото! Нажми 'Готово'.");
                return;
            }
            
            // Вспышка экрана
            video.style.opacity = 0.3;
            setTimeout(() => video.style.opacity = 1, 100);

            // Отрисовка на canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Запуск красивой анимации полета кадра
            playFlyAnimation();

            // Сжатие и добавление в массив
            compressAndAddCanvas();
        });

        // 🚨 ФУНКЦИЯ АНИМАЦИИ: Летающий кадр 🚨
        function playFlyAnimation() {
            const clone = document.createElement('canvas');
            clone.width = canvas.width;
            clone.height = canvas.height;
            const cloneCtx = clone.getContext('2d');
            cloneCtx.drawImage(canvas, 0, 0);
            
            clone.className = 'fly-animation';
            // Ставим кадр ровно по центру (как наша рамочка)
            clone.style.top = '10%'; 
            clone.style.left = '10%';
            clone.style.width = '80%';
            clone.style.height = '60%';
            
            cameraContainer.appendChild(clone);
            
            // Эффект "пульсации" счетчика
            camCounter.style.transform = 'translateX(-50%) scale(1.2)';
            setTimeout(() => camCounter.style.transform = 'translateX(-50%) scale(1)', 200);

            // Через миллисекунду отправляем кадр в полет вниз
            requestAnimationFrame(() => {
                clone.style.top = '90%'; // Улетает вниз
                clone.style.left = '45%'; // Улетает в центр
                clone.style.width = '10%'; // Сжимается
                clone.style.height = '10%';
                clone.style.opacity = '0'; // Растворяется
                clone.style.borderRadius = '50%';
            });
            
            // Удаляем клона после завершения полета
            setTimeout(() => clone.remove(), 500);
        }

        function updateCamCounter() {
            camCounter.innerText = `Снято: ${photos.length} / ${MAX_PHOTOS}`;
            if (photos.length >= MAX_PHOTOS) {
                camCounter.style.backgroundColor = 'rgba(255, 50, 50, 0.8)'; // Краснеет при лимите
            } else {
                camCounter.style.backgroundColor = 'rgba(0,0,0,0.6)';
            }
        }

        // --- ЛОГИКА ГАЛЕРЕИ ---
        document.getElementById('openGalleryBtn').addEventListener('click', () => {
            if (photos.length >= MAX_PHOTOS) return alert("Максимум 5 фото!");
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            const slotsLeft = MAX_PHOTOS - photos.length;
            const filesToProcess = files.slice(0, slotsLeft);
            
            if (files.length > slotsLeft) alert(`Добавлено только ${slotsLeft} фото (лимит 5).`);
            
            filesToProcess.forEach(file => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    compressAndAddCanvas();
                }
            });
            fileInput.value = ""; 
        });

        // --- СЖАТИЕ (CANVAS) ---
        function compressAndAddCanvas() {
            const MAX_SIZE = 1080;
            let width = canvas.width;
            let height = canvas.height;

            if (width > height && width > MAX_SIZE) {
                height *= MAX_SIZE / width;
                width = MAX_SIZE;
            } else if (height > MAX_SIZE) {
                width *= MAX_SIZE / height;
                height = MAX_SIZE;
            }

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, width, height);

            tempCanvas.toBlob((blob) => {
                photos.push(blob);
                updateUI();
                updateCamCounter(); // Обновляем счетчик внутри камеры
                
                // Если наснимали 5 фоток, закрываем камеру автоматически
                if (photos.length >= MAX_PHOTOS && stream) {
                    setTimeout(closeCamera, 600); // Ждем пока закончится анимация
                }
            }, 'image/jpeg', 0.8);
        }

        // --- ИНТЕРФЕЙС И ОТПРАВКА ---
        function updateUI() {
            thumbnailsContainer.innerHTML = '';
            photos.forEach((blob, index) => {
                const div = document.createElement('div');
                div.className = 'thumb-wrapper';
                
                const img = document.createElement('img');
                img.src = URL.createObjectURL(blob);
                
                const btn = document.createElement('button');
                btn.className = 'delete-btn';
                btn.innerHTML = '✕';
                btn.onclick = () => {
                    photos.splice(index, 1);
                    updateUI();
                };

                div.appendChild(img);
                div.appendChild(btn);
                thumbnailsContainer.appendChild(div);
            });

            uploadBtn.textContent = `🚀 Отправить на оценку (${photos.length}/5)`;
            uploadBtn.disabled = photos.length === 0;

            document.getElementById('openCameraBtn').disabled = photos.length >= MAX_PHOTOS;
            document.getElementById('openGalleryBtn').disabled = photos.length >= MAX_PHOTOS;
        }

        // 🚨 ВСТАВЬ СЮДА СВОЮ ССЫЛКУ НА СЕРВЕР AMVERA 🚨
        const SERVER_URL = "https://hlamik-hlamik.waw0.amvera.tech/api/upload";

        uploadBtn.addEventListener('click', async () => {
            if (photos.length === 0) return;

            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) return alert("Ошибка Телеграм ID.");

            const formData = new FormData();
            photos.forEach((blob, index) => {
                formData.append('files', blob, `photo_${index}.jpg`);
            });
            formData.append('user_id', userId);

            uploadBtn.disabled = true;
            uploadBtn.textContent = "⏳ Отправка сжатых фото...";

            try {
                const response = await fetch(SERVER_URL, { method: 'POST', body: formData });
                if (response.ok) {
                    tg.close();
                } else {
                    alert("Ошибка сервера. Попробуй еще раз.");
                    uploadBtn.disabled = false;
                    updateUI();
                }
            } catch (error) {
                alert("Ошибка сети.");
                uploadBtn.disabled = false;
                updateUI();
            }
        });
    </script>
</body>
</html>
