<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlamik Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
        .btn { background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 15px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 20px;}
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .file-upload { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; margin-bottom: 20px; }
        #preview { margin-top: 15px; font-size: 14px; color: #666; font-weight: bold;}
    </style>
</head>
<body>
    <h2>Сканер гаджетов 📷</h2>
    <p>Выбери до 5 фотографий (с разных ракурсов, дефекты крупным планом)</p>

    <div class="file-upload">
        <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
    <div id="preview">Фото не выбраны</div>

    <button id="uploadBtn" class="btn" disabled>Отправить на оценку</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const preview = document.getElementById('preview');

        // 🚨 ВСТАВЬ СЮДА ССЫЛКУ НА СВОЙ СЕРВЕР AMVERA 🚨
        const SERVER_URL = "https://hlamik-hlamik.waw0.amvera.tech/api/upload";

        // Обработка выбора файлов
        fileInput.addEventListener('change', () => {
            const fileCount = fileInput.files.length;
            if (fileCount > 0) {
                if (fileCount > 10) {
                    preview.textContent = `🛑 Слишком много фото (${fileCount})! Максимум 10.`;
                    preview.style.color = "red";
                    uploadBtn.disabled = true;
                } else {
                    preview.textContent = `✅ Выбрано фото: ${fileCount}`;
                    preview.style.color = "green";
                    uploadBtn.disabled = false;
                }
            } else {
                uploadBtn.disabled = true;
                preview.textContent = "Фото не выбраны";
                preview.style.color = "#666";
            }
        });

        // Отправка на сервер
        uploadBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) return;

            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                alert("Ошибка: не удалось получить ID пользователя Телеграм. Открой Web App внутри бота.");
                return;
            }

            const formData = new FormData();
            
            // 🚨 ПАКУЕМ ВСЕ ФАЙЛЫ В МАССИВ ДЛЯ FASTAPI 🚨
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }
            formData.append('user_id', userId);

            uploadBtn.disabled = true;
            uploadBtn.textContent = "⏳ Отправка (может занять время)...";

            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    tg.close(); // Закрываем окно после успеха
                } else {
                    alert("Ошибка при отправке на сервер. Попробуй еще раз.");
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = "Отправить на оценку";
                }
            } catch (error) {
                alert("Ошибка сети: " + error.message);
                uploadBtn.disabled = false;
                uploadBtn.textContent = "Отправить на оценку";
            }
        });
    </script>
</body>
</html>
