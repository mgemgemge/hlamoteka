<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlamik Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000); 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0; 
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { color: var(--tg-theme-hint-color, #888888); margin-bottom: 20px; font-size: 14px; transition: color 0.3s; }
        
        .btn-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .action-btn { 
            background-color: var(--tg-theme-button-color, #2481cc); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            padding: 12px 15px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            flex: 1; 
            border: none; 
            transition: 0.2s; 
        }
        .action-btn.disabled { opacity: 0.5; pointer-events: none; background-color: gray; }
        input[type="file"] { display: none; }
        
        .counter { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .preview-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .preview-grid img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s; }
        
        /* Стили для кастомной In-App камеры */
        #customCameraUI { display: none; position: relative; width: 100%; max-width: 400px; margin: 0 auto 20px; overflow: hidden; border-radius: 12px; }
        video { width: 100%; display: block; background: #000; border-radius: 12px; }
        
        /* Рамка-прицел */
        .overlay-frame {
            position: absolute; top: 10%; left: 10%; right: 10%; bottom: 10%;
            border: 2px dashed #31b545; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; 
            background: rgba(0, 0, 0, 0.2);
        }
        .frame-text {
            color: #ffffff; font-weight: bold; font-size: 18px; text-transform: uppercase;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8); text-align: center; padding: 10px;
        }
    </style>
</head>
<body>

    <h1 id="appTitle">Hlamik AI 🤖</h1>
    <p id="mainHint">Добавьте от 1 до 5 фото со всех сторон</p>

    <div id="customCameraUI">
        <video id="videoElement" autoplay playsinline></video>
        <div class="overlay-frame">
            <div class="frame-text">СТРОГО 1 ВЕЩЬ<br><span style="font-size: 12px; opacity: 0.8;">в центре кадра</span></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="action-btn" id="btnSnap" style="background-color: #31b545;">📸 Снять</button>
            <button class="action-btn" id="btnCancel" style="background-color: #d32f2f;">❌ Отмена</button>
        </div>
        <canvas id="canvasElement" style="display:none;"></canvas>
    </div>

    <div id="mainUI">
        <div class="counter" id="photoCounter">Фото: 0 / 5</div>

        <div class="btn-container">
            <button class="action-btn" id="btnCameraOpen"><span id="textCamera">📸 Камера</span></button>
            <label class="action-btn" id="btnGallery">
                <span id="textGallery">🖼 Галерея</span>
                <input type="file" id="inputGallery" accept="image/*" multiple>
            </label>
        </div>

        <div class="preview-grid" id="previewGrid"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const mainUI = document.getElementById('mainUI');
        const customCameraUI = document.getElementById('customCameraUI');
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');
        const btnCameraOpen = document.getElementById('btnCameraOpen');
        const btnSnap = document.getElementById('btnSnap');
        const btnCancel = document.getElementById('btnCancel');
        
        const inputGallery = document.getElementById('inputGallery');
        const previewGrid = document.getElementById('previewGrid');
        const photoCounter = document.getElementById('photoCounter');
        const btnGallery = document.getElementById('btnGallery');
        const textCamera = document.getElementById('textCamera');
        const textGallery = document.getElementById('textGallery');
        const mainHint = document.getElementById('mainHint');
        const appTitle = document.getElementById('appTitle');
        
        let compressedFiles = [];
        let stream = null;
        const MAX_PHOTOS = 5;

        function updateUI() {
            photoCounter.innerText = `Фото: ${compressedFiles.length} / ${MAX_PHOTOS}`;
            
            if (compressedFiles.length > 0) {
                tg.MainButton.text = "ОТПРАВИТЬ НА ОЦЕНКУ";
                tg.MainButton.color = "#31b545";
                tg.MainButton.show();

                if (compressedFiles.length < MAX_PHOTOS) {
                    textCamera.innerText = "➕ Еще фото";
                    textGallery.innerText = "➕ Из галереи";
                    mainHint.innerText = "Отлично! Можете добавить еще ракурсы или отправить.";
                    mainHint.style.color = "#31b545";
                } else {
                    mainHint.innerText = "Максимум фото загружен! Жмите 'Отправить'.";
                    mainHint.style.color = "#d32f2f";
                    btnCameraOpen.classList.add('disabled');
                    btnGallery.classList.add('disabled');
                    textCamera.innerText = "MAX";
                    textGallery.innerText = "MAX";
                }
            } else {
                tg.MainButton.hide();
                mainHint.innerText = "Добавьте от 1 до 5 фото со всех сторон";
                mainHint.style.color = "var(--tg-theme-hint-color, #888888)";
                btnCameraOpen.classList.remove('disabled');
                btnGallery.classList.remove('disabled');
                textCamera.innerText = "📸 Камера";
                textGallery.innerText = "🖼 Галерея";
            }
        }

        btnCameraOpen.addEventListener('click', async () => {
            if (compressedFiles.length >= MAX_PHOTOS) return;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" },
                    audio: false
                });
                videoElement.srcObject = stream;
                
                mainUI.style.display = 'none';
                appTitle.style.display = 'none';
                mainHint.style.display = 'none';
                customCameraUI.style.display = 'block';
                tg.MainButton.hide(); 
            } catch (err) {
                tg.showAlert("Не удалось открыть камеру! Разрешите доступ или используйте Галерею.");
            }
        });

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            customCameraUI.style.display = 'none';
            mainUI.style.display = 'block';
            appTitle.style.display = 'block';
            mainHint.style.display = 'block';
            updateUI(); 
        }

        btnCancel.addEventListener('click', stopCamera);

        btnSnap.addEventListener('click', () => {
            const context = canvasElement.getContext('2d');
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            
            canvasElement.toBlob((blob) => {
                if (compressedFiles.length < MAX_PHOTOS) {
                    compressedFiles.push(blob);
                    
                    const imgPreview = document.createElement('img');
                    imgPreview.src = URL.createObjectURL(blob);
                    previewGrid.appendChild(imgPreview);
                    updateUI();
                }
                stopCamera(); 
            }, 'image/jpeg', 0.7);
        });

        function processFile(file) {
            if (compressedFiles.length >= MAX_PHOTOS) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let scaleSize = 1;
                    if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                    canvas.width = img.width * scaleSize;
                    canvas.height = img.height * scaleSize;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob((blob) => {
                        if (compressedFiles.length < MAX_PHOTOS) {
                            compressedFiles.push(blob);
                            const imgPreview = document.createElement('img');
                            imgPreview.src = URL.createObjectURL(blob);
                            previewGrid.appendChild(imgPreview);
                            updateUI();
                        }
                    }, 'image/jpeg', 0.7);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        inputGallery.addEventListener('change', (e) => {
            for(let i = 0; i < e.target.files.length; i++) {
                processFile(e.target.files[i]);
            }
            e.target.value = ''; 
        });

        tg.MainButton.onClick(async function() {
            const user = tg.initDataUnsafe?.user; 
            if (compressedFiles.length === 0) {
                tg.showAlert("Сделайте фото!");
                return;
            }

            tg.MainButton.text = "ОТПРАВЛЯЕМ... ⏳";
            tg.MainButton.showProgress();

            const formData = new FormData();
            
            // Отправляем первое фото для анализа, чтобы бэкенд отработал штатно
            formData.append('file', compressedFiles[0], 'photo_0.jpg');
            formData.append('user_id', user ? user.id : 123456789); 

            try {
                // Идеальная ссылка без дублей https://
                const response = await fetch('https://hlamik-hlamik.waw0.amvera.tech/api/upload', {
                    method: 'POST',
                    headers: {
                        'ngrok-skip-browser-warning': 'true' 
                    },
                    body: formData
                });

                if (response.ok) {
                    tg.close(); 
                } else {
                    tg.showAlert("Сервер ругается. Код ошибки: " + response.status);
                    tg.MainButton.hideProgress();
                    tg.MainButton.text = "ОТПРАВИТЬ НА ОЦЕНКУ";
                }
            } catch (err) {
                tg.showAlert("Связь оборвалась: " + err.message + ". Проверь VPN или Ngrok!");
                tg.MainButton.hideProgress();
                tg.MainButton.text = "ОТПРАВИТЬ НА ОЦЕНКУ";
            }
        });
    </script>
</body>
</html>
